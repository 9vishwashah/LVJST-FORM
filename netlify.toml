[build]
  publish = "."
  functions = "register/netlify/functions"

[dev]
  framework = "#static"
  publish = "."

[[redirects]]
  from = "/register/*"
  to = "/register/:splat"
  status = 200

[[redirects]]
  from = "/register"
  to = "/register/index.html"
  status = 200

[[redirects]]
  from = "/research/admin"
  to = "/research/admin.html"
  status = 200

[[redirects]]
  from = "/research"
  to = "/research/index.html"
  status = 200

[[redirects]]
  from = "/research/*"
  to = "/research/:splat"
  status = 200
